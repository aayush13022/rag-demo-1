<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://unpkg.com/streamlit-component-lib@2.0.0/dist/streamlit-component-lib.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Source Sans Pro", sans-serif;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #mic {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      color: #04261d;
      background: #00d09c;
      box-shadow: 0 3px 12px rgba(0, 208, 156, 0.45);
      transition: transform 0.12s ease, background 0.12s ease;
    }
    #mic:hover { transform: scale(1.07); }
    #mic:disabled {
      background: #44506b;
      color: #aab;
      cursor: not-allowed;
      box-shadow: none;
    }
    #mic.recording {
      background: #ff5a6a;
      color: #fff;
      animation: pulse 1.2s infinite;
    }
    #mic.error { background: #f59e0b; color: #1a1300; }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(255, 90, 106, 0.6); }
      70% { box-shadow: 0 0 0 12px rgba(255, 90, 106, 0); }
      100% { box-shadow: 0 0 0 0 rgba(255, 90, 106, 0); }
    }
    svg { display: block; }
  </style>
</head>
<body>
  <button id="mic" type="button" title="Speak your question">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
      <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3z"/>
      <path d="M19 11a1 1 0 1 0-2 0 5 5 0 0 1-10 0 1 1 0 1 0-2 0 7 7 0 0 0 6 6.92V21a1 1 0 1 0 2 0v-3.08A7 7 0 0 0 19 11z"/>
    </svg>
  </button>

  <script>
    const btn = document.getElementById("mic");
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

    let silenceMs = 6000;
    let listening = false;
    let rec = null;
    let finalText = "";
    let silenceTimer = null;

    function setState(cls, title) {
      btn.classList.remove("recording", "error");
      if (cls) btn.classList.add(cls);
      btn.title = title || "Speak your question";
    }

    function resetSilenceTimer() {
      clearTimeout(silenceTimer);
      silenceTimer = setTimeout(() => {
        try { rec && rec.stop(); } catch (e) {}
      }, silenceMs);
    }

    function clearSilenceTimer() {
      clearTimeout(silenceTimer);
      silenceTimer = null;
    }

    function startListening() {
      if (!SR || listening) return;

      rec = new SR();
      rec.lang = "en-IN";
      rec.continuous = true;
      rec.interimResults = true;
      rec.maxAlternatives = 1;
      finalText = "";

      rec.onstart = () => {
        listening = true;
        setState("recording", "Listening… auto-stops after silence");
        resetSilenceTimer();
      };

      rec.onresult = (event) => {
        for (let i = event.resultIndex; i < event.results.length; i++) {
          if (event.results[i].isFinal) {
            finalText += event.results[i][0].transcript + " ";
          }
        }
        resetSilenceTimer();
      };

      rec.onerror = (event) => {
        const err = event.error || "unknown";
        if (err === "not-allowed" || err === "service-not-allowed") {
          setState("error", "Allow microphone in browser settings");
        } else if (err !== "aborted" && err !== "no-speech") {
          setState("error", "Voice error: " + err);
        }
      };

      rec.onend = () => {
        clearSilenceTimer();
        listening = false;
        if (!btn.classList.contains("error")) setState("", "");
        const text = finalText.trim();
        if (text) {
          Streamlit.setComponentValue({ text: text, id: Date.now() });
        }
        rec = null;
      };

      try {
        rec.start();
      } catch (e) {
        setState("error", "Could not start microphone");
      }
    }

    function stopListening() {
      if (!listening || !rec) return;
      try { rec.stop(); } catch (e) {}
    }

    if (!SR) {
      btn.disabled = true;
      btn.title = "Voice needs Chrome or Edge";
    } else {
      btn.addEventListener("click", () => {
        if (listening) stopListening();
        else startListening();
      });
    }

    function onRender(event) {
      const args = event.detail.args || {};
      silenceMs = Number(args.silence_ms) || 6000;
      Streamlit.setFrameHeight(48);
    }

    Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, onRender);
    Streamlit.setComponentReady();
    Streamlit.setFrameHeight(48);
  </script>
</body>
</html>
